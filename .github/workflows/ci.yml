# CI pipeline — single workflow, 7 jobs.
#
# Topology (gates):
#   lint, test, helm-validate, gitleaks  (parallel, all must pass)
#         └──> build-scan-push           (Trivy CRITICAL/HIGH fail, cosign sign, SBOM attest, push GHCR)
#                    ├──> integration-test  (kind cluster + helm install + helm test)
#                    └──> deploy            (SSM Run-Command rolls new image onto live EC2)
#
# Permission notes:
#   - id-token: write   → required for both AWS OIDC (deploy) and Sigstore (cosign keyless).
#   - packages: write   → push to ghcr.io/${owner}/insider-one-devops.
#   - security-events: write → upload Trivy SARIF to the GitHub Security tab.
#
# Triggers:
#   - push to main: full pipeline including deploy.
#   - PR: everything except deploy (the deploy job preflights on EC2_INSTANCE_ID secret).
#   - workflow_dispatch: manual runs (re-publish after rotating a secret etc.).
name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write          # AWS OIDC on deploy job + cosign keyless signing
  pull-requests: read
  security-events: write   # upload Trivy SARIF to the Security tab

env:
  GO_VERSION: "1.25"
  IMAGE_REPO: ghcr.io/${{ github.repository_owner }}/insider-one-devops
  AWS_REGION: eu-north-1

jobs:
  # Static analysis: govet, staticcheck, errcheck, gosec via golangci-lint.
  # Fast (~30s); first gate so cheap-to-fix issues land on PR feedback quickly.
  lint:
    name: lint (golangci-lint)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - uses: golangci/golangci-lint-action@v6
        with:
          version: v1.62.0
          args: --timeout=5m

  # Unit tests with the race detector + coverage. -count=1 disables Go's test
  # result cache so cached-passes can't sneak through.
  test:
    name: test (race + cover)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - run: go test ./... -race -cover -count=1

  # Chart hygiene:
  #   - helm lint   : YAML well-formedness, semver, schema-ish checks.
  #   - kubeconform : renders prod values + validates each manifest against
  #     k8s 1.30 OpenAPI schemas. Catches bad fields BEFORE they hit a cluster.
  #     CRD-backed kinds (ServiceMonitor, PrometheusRule) are skipped — no
  #     schema available without the kube-prometheus-stack install.
  helm-validate:
    name: helm lint + kubeconform
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with:
          version: v3.16.2
      - name: Install kubeconform
        run: |
          curl -fsSL https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz \
            | tar -xz -C /usr/local/bin kubeconform
      - run: helm lint charts/app
      - run: helm lint charts/app -f charts/app/values-dev.yaml
      - run: helm lint charts/app -f charts/app/values-prod.yaml
      - run: |
          helm template app charts/app -f charts/app/values-prod.yaml \
            | kubeconform -strict -summary -kubernetes-version 1.30.0 \
                -skip ServiceMonitor,PrometheusRule

  # gitleaks — scans full history (fetch-depth: 0). Custom rule
  # `lone-token-in-env-file` is in .gitleaks.toml; catches bare tokens
  # in .env files even when default rules miss them.
  gitleaks:
    name: gitleaks (secret scan)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

  # Image pipeline — only runs after all 4 gates above pass.
  # Steps inside:
  #   1. setup-buildx (multi-arch via QEMU)
  #   2. login to ghcr.io with GITHUB_TOKEN
  #   3. buildx build --platform=linux/amd64,linux/arm64 (no push yet)
  #   4. Trivy scan — fails build on CRITICAL/HIGH. SARIF uploaded to Security tab.
  #   5. Push to GHCR (tags: short SHA + latest)
  #   6. cosign sign — keyless, uses GitHub OIDC; signature stored as .sig tag.
  #   7. syft → CycloneDX SBOM → cosign attest --type cyclonedx; .att tag in GHCR.
  #   8. Output the SHA for downstream jobs (deploy/integration use it as image tag).
  build-scan-push:
    name: build + Trivy + cosign + SBOM + push (GHCR)
    needs: [lint, test, helm-validate, gitleaks]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3      # arm64 emulation on amd64 runner
      - uses: docker/setup-buildx-action@v3

      - name: Compute build metadata
        id: meta
        run: |
          echo "sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          echo "time=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      # --- Pre-scan: single-arch local build so Trivy can read the image fast.
      - name: Build (single-arch, local) for Trivy
        uses: docker/build-push-action@v6
        id: build-local
        with:
          context: .
          load: true
          tags: ${{ env.IMAGE_REPO }}:${{ steps.meta.outputs.sha }}
          build-args: |
            BUILD_SHA=${{ steps.meta.outputs.sha }}
            BUILD_TIME=${{ steps.meta.outputs.time }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Trivy image scan (table — fail CI on CRITICAL/HIGH)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.IMAGE_REPO }}:${{ steps.meta.outputs.sha }}
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          vuln-type: os,library

      - name: Trivy image scan (SARIF — GitHub Security tab)
        if: always()
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.IMAGE_REPO }}:${{ steps.meta.outputs.sha }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH,MEDIUM
          ignore-unfixed: true
          vuln-type: os,library
          exit-code: "0"

      # SARIF upload requires GitHub Advanced Security on private repos.
      # The repo is currently private, so the API returns 403 ("Resource not
      # accessible by integration"). Don't fail the whole pipeline on it —
      # the Trivy scan above already gates on CRITICAL/HIGH. When the repo
      # flips public, SARIF resumes populating the Security tab.
      - name: Upload Trivy SARIF to GitHub Security
        if: always() && hashFiles('trivy-results.sarif') != ''
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
          category: trivy-image

      # --- Push path (main only): multi-arch + sign + SBOM ----------------
      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push multi-arch (amd64 + arm64), capture digest
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        id: build-push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.IMAGE_REPO }}:${{ steps.meta.outputs.sha }}
            ${{ env.IMAGE_REPO }}:latest
          build-args: |
            BUILD_SHA=${{ steps.meta.outputs.sha }}
            BUILD_TIME=${{ steps.meta.outputs.time }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true

      - name: Install cosign
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: 'v2.4.1'

      - name: Sign image (keyless, GitHub OIDC)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          DIGEST: ${{ steps.build-push.outputs.digest }}
        run: |
          cosign sign --yes "${{ env.IMAGE_REPO }}@${DIGEST}"

      - name: Verify signature (gate — fail CI if signing didn't take)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          DIGEST: ${{ steps.build-push.outputs.digest }}
        run: |
          cosign verify "${{ env.IMAGE_REPO }}@${DIGEST}" \
            --certificate-identity-regexp "^https://github.com/${{ github.repository }}/.github/workflows/.*$" \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            | head -c 500

      - name: Generate SBOM (Syft, CycloneDX)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.IMAGE_REPO }}@${{ steps.build-push.outputs.digest }}
          format: cyclonedx-json
          output-file: sbom.cdx.json
          upload-artifact: true
          upload-release-assets: false

      - name: Attach SBOM to image (cosign attest, CycloneDX predicate)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          DIGEST: ${{ steps.build-push.outputs.digest }}
        run: |
          cosign attest --yes \
            --predicate sbom.cdx.json \
            --type cyclonedx \
            "${{ env.IMAGE_REPO }}@${DIGEST}"
    outputs:
      sha: ${{ steps.meta.outputs.sha }}
      digest: ${{ steps.build-push.outputs.digest }}

  # Integration — spins up a kind cluster, loads the freshly-built image,
  # installs the chart with dev values, port-forwards, smoke-tests /ping
  # + /healthz, runs `helm test` (bundled chart tests). Catches chart-level
  # regressions before the deploy job rolls them to the live cluster.
  # Kyverno is NOT installed here — the live EC2 has it. Difference between
  # kind and live can mask issues; manual `helm test app` on EC2 is the
  # belt-and-braces verification.
  integration-test:
    name: integration test (kind + helm install + helm test)
    needs: [build-scan-push]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image for kind (single-arch, local)
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: app:ci
          build-args: |
            BUILD_SHA=${{ needs.build-scan-push.outputs.sha }}
            BUILD_TIME=ci
          cache-from: type=gha
          platforms: linux/amd64
      - uses: helm/kind-action@v1
        with:
          version: v0.24.0
          cluster_name: ci
          wait: 90s
      - name: Load image into kind
        run: kind load docker-image app:ci --name ci
      - uses: azure/setup-helm@v4
        with:
          version: v3.16.2
      - name: Install chart (dev values, image=app:ci)
        run: |
          helm upgrade --install app charts/app \
            -f charts/app/values-dev.yaml \
            --set image.repository=app \
            --set image.tag=ci \
            --set image.pullPolicy=Never \
            --wait --timeout 3m
      - name: Show cluster state
        run: |
          kubectl get pods,svc,ingress -A
          kubectl describe deploy/app-app || true
      - name: Smoke-test endpoints via port-forward
        run: |
          kubectl wait --for=condition=ready pod \
            -l app.kubernetes.io/name=app -l app.kubernetes.io/instance=app \
            --timeout=60s
          kubectl port-forward svc/app-app 18080:80 &
          PF_PID=$!
          trap 'kill $PF_PID >/dev/null 2>&1 || true' EXIT
          # Wait for port-forward to be reachable.
          for _ in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:18080/ping >/dev/null; then break; fi
            sleep 1
          done
          curl -fsS http://127.0.0.1:18080/ping     | grep -q '^pong$'
          curl -fsS http://127.0.0.1:18080/healthz  | grep -q '"status":"ok"'
          curl -fsS http://127.0.0.1:18080/version  | grep -q '"sha"'
      - name: helm test (chart-bundled tests)
        run: helm test app --logs

  # Deploy — pushes the new image to the live minikube cluster on EC2.
  #
  # Why SSM, not ssh:
  #   - No SSH key in the repo → no key to rotate / leak.
  #   - SG can keep port 22 closed to the world (operator-CIDR only).
  #   - All commands are audited in CloudTrail under the OIDC-assumed role.
  #
  # Preflight gate: skips deploy if AWS_DEPLOY_ROLE_ARN or EC2_INSTANCE_ID
  # secrets aren't set (e.g. fork PRs, post-teardown). Keeps the workflow green
  # when the live stack is intentionally down.
  #
  # Roll command:
  #   - sudo -iu ec2-user  : AL2023 default user (NOT ubuntu).
  #   - deployment/app-app : Helm fullname = "<release>-<chart>" = "app-app".
  deploy:
    name: deploy (minikube on EC2 via SSM)
    needs: [build-scan-push, integration-test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: prod
    steps:
      - name: Preflight — check deploy secrets
        id: preflight
        env:
          ARN: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          EC2: ${{ secrets.EC2_INSTANCE_ID }}
        run: |
          if [ -z "$ARN" ] || [ -z "$EC2" ]; then
            echo "::notice::Deploy secrets not configured (AWS_DEPLOY_ROLE_ARN / EC2_INSTANCE_ID). Skipping deploy."
            echo "configured=false" >> "$GITHUB_OUTPUT"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Configure AWS credentials (OIDC)
        if: steps.preflight.outputs.configured == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Roll image on minikube via SSM
        if: steps.preflight.outputs.configured == 'true'
        env:
          INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
          IMAGE: ${{ env.IMAGE_REPO }}:${{ needs.build-scan-push.outputs.sha }}
        run: |
          set -euo pipefail
          CMD_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name AWS-RunShellScript \
            --comment "deploy ${IMAGE}" \
            --parameters commands="[\"sudo -iu ec2-user kubectl -n default set image deployment/app-app app=${IMAGE}\",\"sudo -iu ec2-user kubectl -n default rollout status deployment/app-app --timeout=120s\"]" \
            --query 'Command.CommandId' --output text)
          aws ssm wait command-executed --command-id "$CMD_ID" --instance-id "$INSTANCE_ID"
          aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" \
            --query '{Status:Status,Stdout:StandardOutputContent,Stderr:StandardErrorContent}'
