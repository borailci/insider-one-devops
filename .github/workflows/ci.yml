name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write   # for AWS OIDC on deploy job
  pull-requests: read

env:
  GO_VERSION: "1.25"
  IMAGE_REPO: ghcr.io/${{ github.repository_owner }}/insider-one-devops
  AWS_REGION: eu-central-1

jobs:
  lint:
    name: lint (golangci-lint)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - uses: golangci/golangci-lint-action@v6
        with:
          version: v1.62.0
          args: --timeout=5m

  test:
    name: test (race + cover)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - run: go test ./... -race -cover -count=1

  helm-validate:
    name: helm lint + kubeconform
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with:
          version: v3.16.2
      - name: Install kubeconform
        run: |
          curl -fsSL https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz \
            | tar -xz -C /usr/local/bin kubeconform
      - run: helm lint charts/app
      - run: helm lint charts/app -f charts/app/values-dev.yaml
      - run: helm lint charts/app -f charts/app/values-prod.yaml
      - run: |
          helm template app charts/app -f charts/app/values-prod.yaml \
            | kubeconform -strict -summary -kubernetes-version 1.30.0

  gitleaks:
    name: gitleaks (secret scan)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

  build-scan-push:
    name: build + Trivy + push (GHCR)
    needs: [lint, test, helm-validate, gitleaks]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Compute build metadata
        id: meta
        run: |
          echo "sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          echo "time=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
      - name: Build image (load to local docker)
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: ${{ env.IMAGE_REPO }}:${{ steps.meta.outputs.sha }}
          build-args: |
            BUILD_SHA=${{ steps.meta.outputs.sha }}
            BUILD_TIME=${{ steps.meta.outputs.time }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Trivy image scan (fail on CRITICAL/HIGH)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.IMAGE_REPO }}:${{ steps.meta.outputs.sha }}
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          vuln-type: os,library
      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Push image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          docker tag ${{ env.IMAGE_REPO }}:${{ steps.meta.outputs.sha }} ${{ env.IMAGE_REPO }}:latest
          docker push ${{ env.IMAGE_REPO }}:${{ steps.meta.outputs.sha }}
          docker push ${{ env.IMAGE_REPO }}:latest
    outputs:
      sha: ${{ steps.meta.outputs.sha }}

  deploy:
    name: deploy (minikube on EC2 via SSM)
    needs: [build-scan-push]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: prod
    steps:
      - name: Preflight — check deploy secrets
        id: preflight
        env:
          ARN: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          EC2: ${{ secrets.EC2_INSTANCE_ID }}
        run: |
          if [ -z "$ARN" ] || [ -z "$EC2" ]; then
            echo "::notice::Deploy secrets not configured (AWS_DEPLOY_ROLE_ARN / EC2_INSTANCE_ID). Skipping deploy."
            echo "configured=false" >> "$GITHUB_OUTPUT"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Configure AWS credentials (OIDC)
        if: steps.preflight.outputs.configured == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Roll image on minikube via SSM
        if: steps.preflight.outputs.configured == 'true'
        env:
          INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
          IMAGE: ${{ env.IMAGE_REPO }}:${{ needs.build-scan-push.outputs.sha }}
        run: |
          set -euo pipefail
          CMD_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name AWS-RunShellScript \
            --comment "deploy ${IMAGE}" \
            --parameters commands="[\"sudo -u ubuntu kubectl -n default set image deployment/app app=${IMAGE} --record\",\"sudo -u ubuntu kubectl -n default rollout status deployment/app --timeout=120s\"]" \
            --query 'Command.CommandId' --output text)
          aws ssm wait command-executed --command-id "$CMD_ID" --instance-id "$INSTANCE_ID"
          aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" \
            --query '{Status:Status,Stdout:StandardOutputContent,Stderr:StandardErrorContent}'
