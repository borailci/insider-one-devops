apiVersion: v1
kind: Pod
metadata:
  name: {{ include "app.fullname" . }}-test-version
  labels:
    {{- include "app.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  restartPolicy: Never
  securityContext:
    runAsNonRoot: true
    runAsUser: 65532
    seccompProfile:
      type: RuntimeDefault
  containers:
    - name: curl
      image: curlimages/curl:8.10.1
      securityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        capabilities:
          drop:
            - ALL
      command:
        - sh
        - -ec
        - |
          set -eu
          host="{{ include "app.fullname" . }}.{{ .Release.Namespace }}.svc.cluster.local:{{ .Values.service.port }}"
          body=$(curl -fsS "http://${host}/version")
          echo "/version => ${body}"
          echo "${body}" | grep -q '"sha"' || { echo "missing sha field"; exit 1; }
          echo "${body}" | grep -q '"build_time"' || { echo "missing build_time field"; exit 1; }
