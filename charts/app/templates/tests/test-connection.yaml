apiVersion: v1
kind: Pod
metadata:
  name: {{ include "app.fullname" . }}-test-connection
  labels:
    {{- include "app.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    # `before-hook-creation` only — keep pod after success so `helm test --logs`
    # can read it. Next test run cleans up before re-creating.
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  restartPolicy: Never
  securityContext:
    runAsNonRoot: true
    runAsUser: 65532
    seccompProfile:
      type: RuntimeDefault
  containers:
    - name: curl
      image: curlimages/curl:8.10.1
      securityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        capabilities:
          drop:
            - ALL
      resources:
        requests:
          cpu: 10m
          memory: 16Mi
        limits:
          cpu: 50m
          memory: 32Mi
      command:
        - sh
        - -ec
        - |
          set -eu
          host="{{ include "app.fullname" . }}.{{ .Release.Namespace }}.svc.cluster.local:{{ .Values.service.port }}"
          echo "Checking /ping ..."
          curl -fsS "http://${host}/ping" | grep -q '^pong$'
          echo "Checking /healthz ..."
          curl -fsS "http://${host}/healthz" | grep -q '"status":"ok"'
          echo "All endpoints OK."
