apiVersion: v1
kind: Pod
metadata:
  name: {{ include "app.fullname" . }}-test-connection
  labels:
    {{- include "app.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  securityContext:
    runAsNonRoot: true
    runAsUser: 65532
    seccompProfile:
      type: RuntimeDefault
  containers:
    - name: curl
      image: curlimages/curl:8.10.1
      securityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        capabilities:
          drop:
            - ALL
      command:
        - sh
        - -ec
        - |
          set -eu
          host="{{ include "app.fullname" . }}.{{ .Release.Namespace }}.svc.cluster.local:{{ .Values.service.port }}"
          echo "Checking /ping ..."
          curl -fsS "http://${host}/ping" | grep -q '^pong$'
          echo "Checking /healthz ..."
          curl -fsS "http://${host}/healthz" | grep -q '"status":"ok"'
          echo "All endpoints OK."
