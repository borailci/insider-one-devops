# Service — stable ClusterIP in front of the (potentially restarted) pods.
# targetPort: http (named) means we can change containerPort in values without
# touching the Service. ServiceMonitor scrapes via this Service for /metrics.
apiVersion: v1
kind: Service
metadata:
  name: {{ include "app.fullname" . }}
  labels:
    {{- include "app.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "app.selectorLabels" . | nindent 4 }}
