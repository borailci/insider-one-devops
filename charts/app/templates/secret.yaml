# Secret — only rendered when values.secrets is non-empty. stringData keeps
# values raw so plain helm install works; in production you'd source these
# from external-secrets / Vault and disable this template entirely.
{{- if .Values.secrets }}
apiVersion: v1
kind: Secret
type: Opaque
metadata:
  name: {{ include "app.fullname" . }}
  labels:
    {{- include "app.labels" . | nindent 4 }}
stringData:
  {{- range $k, $v := .Values.secrets }}
  {{ $k }}: {{ $v | quote }}
  {{- end }}
{{- end }}
