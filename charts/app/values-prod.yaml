# Prod overrides — two replicas, headroom, prod hostname.

replicaCount: 2

config:
  LOG_LEVEL: info

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

ingress:
  # Empty host = catch-all. Public demo URL is http://<EIP>/ — no DNS, no Host header.
  hosts:
    - host: ""
      paths:
        - path: /
          pathType: Prefix

serviceMonitor:
  enabled: true

prometheusRule:
  enabled: true

# Production posture trifecta — Day 2 bonus.
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 60

networkPolicy:
  enabled: true

podDisruptionBudget:
  enabled: true
  minAvailable: 1
