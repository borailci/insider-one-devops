title = "insider-one-devops gitleaks config"

# Extend the upstream default rules; do not redefine them.
[extend]
useDefault = true

[allowlist]
description = "Repo-specific false-positive allowlist"
paths = [
  '''^docs/adr/''',
  '''^SPEC\.md$''',
  '''^README\.md$''',
  '''^charts/app/values.*\.yaml$''',
]
# Common placeholder strings used in docs/values that resemble secrets.
regexes = [
  '''AKIA[0-9A-Z]{16}EXAMPLE''',
  '''example-?token''',
  '''dummy-?secret''',
]

# Catches a token-shaped value sitting on its own line in any .env / .env.example
# (no KEY= prefix, not a comment). Class of mistake hit on 2026-05-18 when a
# Grafana admin password was pasted bare into .env.example.
[[rules]]
id = "lone-token-in-env-file"
description = "Bare token-shaped value on its own line in an env file (missing KEY= prefix)"
regex = '''(?m)^[A-Za-z0-9+/_-]{20,}={0,2}\s*$'''
path = '''(^|/)\.env(\.[A-Za-z0-9_-]+)?$'''
